events:
  # event fields can include:
  # - title: "Community meetup: Month YYYY"
  # - date: "DD/MM/YYYY"
  # - time: "18:00-20:00" (optional)
  # - place: "Building room" (optional)
  # - description: "..."
  # - talks: [...]
  # talks can be either:
  # 1) tuple-like lists: talks: [["Speaker", "Talk Title"], ["Speaker", "Talk Title"]]
  # 2) object lists:     talks: [{ speaker: "Speaker", title: "Talk Title" }]
  # 3) speaker links:    talks: [{ speaker: "Speaker", speaker_url: "https://...", title: "Talk Title" }]

